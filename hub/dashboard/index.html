<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Multi-Agent Dashboard</title>
  <meta name="author" content="Ömer Faruk Ceylandağ">
  <meta name="description" content="Multi-Agent AI Dashboard — Created by Ömer Faruk Ceylandağ">
  <meta name="creator" content="Ömer Faruk Ceylandağ">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="sidebar">
    <div class="sidebar-hdr">
      <h1>Agents</h1>
      <button onclick="toggleTheme()" title="Theme">◐</button>
      <button onclick="toggleNotif()" id="notifBtn" title="Notifications">🔕</button>
      <button onclick="toggleSound()" id="soundBtn" title="Sound">🔇</button>
      <button onclick="exportSession()" title="Export">📥</button>
      <button onclick="shutdownSystem()" title="Shutdown system" style="color:var(--red)">⏻</button>
    </div>
    <div id="agentList"></div>
  </div>
  <div id="main">
    <div id="workspaceBar" style="display:none"></div>
    <div class="top-bar">
      <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')" title="Toggle sidebar">☰</button>
      <button class="tab-btn active" data-tab="logs" onclick="switchTab('logs')">📋 Logs</button>
      <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks')">📌 Tasks <span class="badge" id="tasksBadge" style="display:none">0</span></button>
      <button class="tab-btn" data-tab="inbox" onclick="switchTab('inbox')">💬 Inbox <span class="badge" id="inboxBadge" style="display:none">0</span></button>
      <button class="tab-btn" data-tab="review" onclick="switchTab('review')">🔍 Review <span class="badge" id="reviewBadge" style="display:none">0</span></button>
      <button class="tab-btn" data-tab="git" onclick="switchTab('git')">🌿 Git</button>
      <button class="tab-btn" data-tab="tests" onclick="switchTab('tests')">🧪 Tests</button>
      <button class="tab-btn" data-tab="activity" onclick="switchTab('activity')">📊 Activity</button>
      <button class="tab-btn" data-tab="locks" onclick="switchTab('locks')">🔒 Locks</button>
      <button class="tab-btn" data-tab="analytics" onclick="switchTab('analytics')">📈 Analytics</button>
      <button class="tab-btn" data-tab="timeline" onclick="switchTab('timeline')">📅 Timeline</button>
      <button class="tab-btn" data-tab="alerts" onclick="switchTab('alerts')">🚨 Alerts <span class="badge" id="alertsBadge" style="display:none">0</span></button>
      <span class="top-spacer"></span>
      <span id="connectionStatus" style="font-size:11px;color:var(--fg3);margin-right:8px"></span>
      <span id="budgetWarn" style="display:none;font-size:11px;cursor:pointer" onclick="switchTab('analytics')"></span>
      <button onclick="showHelp()" title="Keyboard shortcuts (?)" style="font-size:11px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--fg3);cursor:pointer;padding:2px 6px">?</button>
    </div>
    <div id="panel"></div>
    <div class="cmd-bar">
      <textarea id="cmdInput" rows="1" placeholder="Task or /command... (Enter to send, Shift+Enter for new line)" oninput="autoResize(this);updateRouteHint(this.value)"></textarea>
      <span id="routeHint"></span>
      <button id="sendBtn" onclick="sendCmd()" title="Enter">Send</button>
    </div>
    <div class="footer">Created by Ömer Faruk Ceylandağ</div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
